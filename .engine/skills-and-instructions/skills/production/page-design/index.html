<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Design — Template Library</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel-2:#1e222e; --line:#2a2f3d;
    --text:#e8eaed; --muted:#9aa0ad; --accent:#4f8cff; --accent-2:#20c997;
    --radius:14px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5}
  header{padding:32px 24px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,17,23,.92);backdrop-filter:blur(8px);z-index:10}
  .wrap{max-width:1280px;margin:0 auto}
  h1{margin:0 0 4px;font-size:24px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:14px;margin:0}
  .meta{color:var(--muted);font-size:12px;margin-top:8px}
  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .filter{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;transition:.15s}
  .filter:hover{color:var(--text);border-color:var(--accent)}
  .filter.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .filter .n{opacity:.7;font-weight:500;margin-left:4px}
  main{max-width:1280px;margin:0 auto;padding:24px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;transition:.18s}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .thumb{position:relative;height:230px;overflow:hidden;background:#fff;border-bottom:1px solid var(--line)}
  /* Scale a full 1280px-wide page down into the card as a live preview. */
  .thumb iframe{position:absolute;top:0;left:0;width:1280px;height:1610px;border:0;
    transform:scale(.2344);transform-origin:top left;pointer-events:none}
  .thumb .open{position:absolute;inset:0;z-index:2;display:flex;align-items:flex-end;justify-content:flex-end;
    padding:10px;opacity:0;transition:.15s;background:linear-gradient(transparent 60%,rgba(0,0,0,.55))}
  .card:hover .thumb .open{opacity:1}
  .open a{background:#fff;color:#111;text-decoration:none;font-size:12px;font-weight:700;
    padding:6px 11px;border-radius:8px}
  .body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .variant{font-weight:700;font-size:15px}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
  .badge.cat{color:var(--accent);border-color:var(--accent)}
  .badge.cr{color:var(--accent-2);border-color:var(--accent-2)}
  .badge.dark{color:#c9b3ff;border-color:#4a3d6b}
  .badge.legacy{color:#ffb454;border-color:#6b5230}
  .best{color:var(--muted);font-size:13px;margin:0}
  .file{color:var(--muted);font-size:11px;font-family:ui-monospace,monospace;opacity:.7}
  footer{max-width:1280px;margin:0 auto;padding:20px 24px 48px;color:var(--muted);font-size:12px}
  .empty{color:var(--muted);padding:40px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Page Design — Template Library</h1>
    <p class="sub">Framework-free static HTML templates with <code>{{PLACEHOLDER}}</code> tokens. Click any card to open the full page.</p>
    <p class="meta" id="meta"></p>
    <div class="controls" id="controls"></div>
  </div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" hidden>No templates in this category.</div>
</main>

</footer>

<script>
(function(){
  var data = JSON.parse(document.getElementById('catalog').textContent || '{}');
  var templates = data.templates || [];
  var labels = data.categoryLabels || {};
  var cats = data.categories || [];
  var grid = document.getElementById('grid');
  var controls = document.getElementById('controls');
  var empty = document.getElementById('empty');
  document.getElementById('meta').textContent =
    (data.count || templates.length) + ' templates · ' + cats.length + ' categories · static HTML · ' + (data.placeholderSyntax || '{{TOKENS}}');

  var hasLegacy = templates.some(function(t){return t.legacy;});
  var filters = [{key:'all',label:'All'}]
    .concat(cats.map(function(c){return {key:c,label:labels[c]||c};}))
    .concat(hasLegacy ? [{key:'__legacy',label:'Legacy'}] : []);
  var active = 'all';

  function count(key){
    if(key==='all') return templates.length;
    if(key==='__legacy') return templates.filter(function(t){return t.legacy;}).length;
    return templates.filter(function(t){return t.category===key && !t.legacy;}).length;
  }

  function renderControls(){
    controls.innerHTML='';
    filters.forEach(function(f){
      var b=document.createElement('button');
      b.className='filter'+(active===f.key?' active':'');
      b.innerHTML=f.label+' <span class="n">'+count(f.key)+'</span>';
      b.onclick=function(){active=f.key;renderControls();renderGrid();};
      controls.appendChild(b);
    });
  }

  function card(t){
    var dark = t.theme==='dark' ? '<span class="badge dark">dark</span>' : '';
    var cr = t.conversionRate ? '<span class="badge cr">'+t.conversionRate+'</span>' : '';
    var legacy = t.legacy ? '<span class="badge legacy">legacy</span>' : '';
    var el=document.createElement('div');
    el.className='card';
    el.innerHTML =
      '<div class="thumb"><iframe loading="lazy" src="'+t.file+'" title="'+t.variant+'"></iframe>'+
        '<div class="open"><a href="'+t.file+'" target="_blank" rel="noopener">Open full page ↗</a></div></div>'+
      '<div class="body">'+
        '<div class="row"><span class="variant">'+t.variant+'</span>'+
          '<span class="badges">'+cr+dark+legacy+'</span></div>'+
        '<div class="badges"><span class="badge cat">'+(labels[t.category]||t.category)+'</span></div>'+
        '<p class="best">'+(t.bestFor||'')+'</p>'+
        '<span class="file">'+t.file+'</span>'+
      '</div>';
    return el;
  }

  function renderGrid(){
    grid.innerHTML='';
    var list = templates.filter(function(t){
      if(active==='all') return true;
      if(active==='__legacy') return t.legacy;
      return t.category===active && !t.legacy;
    });
    empty.hidden = list.length>0;
    list.forEach(function(t){grid.appendChild(card(t));});
  }

  renderControls();
  renderGrid();
})();
</script>
