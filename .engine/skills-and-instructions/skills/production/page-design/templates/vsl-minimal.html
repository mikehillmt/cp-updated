<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #E8590C;
      --text: #1A1A2E;
      --text-light: #4A4A68;
      --bg: #FFFFFF;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 16px;
      text-align: center;
    }
    .page h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 32px;
      max-width: 700px;
    }
    .video-wrap {
      max-width: 800px;
      width: 100%;
      margin: 0 auto 32px;
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      border-radius: 8px;
      overflow: hidden;
      background: #000;
    }
    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .cta {
      display: inline-block;
      padding: 18px 48px;
      font-size: 1.25rem;
      font-weight: 700;
      font-family: var(--font);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232,89,12,0.4);
    }
    .sub-cta {
      font-size: 0.875rem;
      color: var(--text-light);
      margin-top: 12px;
    }
    footer {
      text-align: center;
      padding: 24px 16px;
      font-size: 0.8125rem;
      color: #ADB5BD;
    }
    @media (min-width: 768px) {
      .page { padding: 80px 24px; }
      .page h1 { font-size: 2.5rem; }
    }
  </style>
</head>
<body>

  <main class="page">
    <h1>{{HEADLINE}}</h1>
    <div class="video-wrap">
      <iframe src="{{VIDEO_EMBED_URL}}" allowfullscreen loading="lazy"></iframe>
    </div>
    <a href="#" class="cta">{{CTA_TEXT}}</a>
    <p class="sub-cta">{{SUB_CTA_TEXT}}</p>
  </main>

  <footer>&copy; {{YEAR}} {{BRAND}}. All rights reserved.</footer>

</body>
</html>
