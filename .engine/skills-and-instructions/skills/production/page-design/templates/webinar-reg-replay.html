<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #E8590C;
      --text: #FFFFFF;
      --text-light: rgba(255,255,255,0.65);
      --bg: #1A1A2E;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }
    .label {
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 1.125rem;
      line-height: 1.5;
      opacity: 0.85;
      margin-bottom: 32px;
    }

    /* Bullets */
    .bullets {
      list-style: none;
      text-align: left;
      max-width: 440px;
      margin: 0 auto 40px;
    }
    .bullets li {
      font-size: 1rem;
      line-height: 1.5;
      padding: 10px 0;
      padding-left: 28px;
      position: relative;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .bullets li:last-child { border-bottom: none; }
    .bullets li::before {
      content: '\2713';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
      top: 10px;
    }

    /* Form */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    .form-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: var(--font);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      transition: border-color 0.15s;
    }
    .form-field::placeholder { color: rgba(255,255,255,0.5); }
    .form-field:focus {
      outline: none;
      border-color: var(--accent);
    }
    .cta {
      display: block;
      width: 100%;
      padding: 18px 40px;
      font-size: 1.25rem;
      font-weight: 700;
      font-family: var(--font);
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232,89,12,0.4);
    }
    .instant-access {
      font-size: 0.875rem;
      opacity: 0.7;
      margin-top: 8px;
      font-weight: 700;
    }
    .privacy {
      font-size: 0.8125rem;
      opacity: 0.5;
      margin-top: 12px;
    }
    footer {
      margin-top: 48px;
      font-size: 0.8125rem;
      opacity: 0.4;
    }
    .spots-left { font-size: 0.8125rem; color: var(--accent); font-weight: 600; margin-top: 8px; }

    /* Sticky Mobile CTA */
    .sticky-cta { display: none; position: fixed; bottom: 0; left: 0; width: 100%; padding: 12px 16px; background: #1A1A2E; box-shadow: 0 -2px 12px rgba(0,0,0,0.3); z-index: 9999; }
    .sticky-cta-btn { display: block; width: 100%; padding: 16px; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; text-decoration: none; border-radius: 6px; background: var(--accent); color: #fff; }
    @media (min-width: 768px) {
      h1 { font-size: 2.75rem; }
      .sticky-cta { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">Watch Now — Free Training</p>
    <h1>{{HEADLINE}}</h1>
    <p class="sub">{{SUBHEADLINE}}</p>

    <ul class="bullets">
      <li>{{BULLET_1}}</li>
      <li>{{BULLET_2}}</li>
      <li>{{BULLET_3}}</li>
    </ul>

    <form class="form-group" action="#" method="POST">
      <input type="email" class="form-field" placeholder="Email address" required>
      <button type="submit" class="cta">Watch Now</button>
    </form>
    <p class="spots-left">Only <strong>{{SPOTS_LEFT}}</strong> spots remaining</p>
    <p class="instant-access">Instant access — starts immediately</p>
    <p class="privacy">We respect your privacy. Unsubscribe anytime.</p>

    <footer>&copy; {{YEAR}} {{BRAND}}</footer>
  </div>

  <div class="sticky-cta" id="stickyCta">
    <a href="#signup" class="sticky-cta-btn">Watch Now</a>
  </div>
  <script>
    (function() {
      var cta = document.querySelector('.cta');
      var sticky = document.getElementById('stickyCta');
      if (!cta || !sticky) return;
      var observer = new IntersectionObserver(function(entries) {
        sticky.style.display = entries[0].isIntersecting ? 'none' : 'block';
      }, { threshold: 0 });
      observer.observe(cta);
    })();
  </script>
</body>
</html>
