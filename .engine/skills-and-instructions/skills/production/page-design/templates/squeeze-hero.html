<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #E8590C;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      color: #fff;
      margin: 0;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('{{HERO_IMAGE}}') center/cover no-repeat;
    }
    .label {
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 3px;
      opacity: 0.8;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1.1;
      max-width: 700px;
      margin-bottom: 24px;
    }
    .sub {
      font-size: 1.125rem;
      line-height: 1.5;
      opacity: 0.85;
      max-width: 540px;
      margin-bottom: 32px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 440px;
    }
    .form-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: var(--font);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      transition: border-color 0.15s;
    }
    .form-field::placeholder { color: rgba(255,255,255,0.6); }
    .form-field:focus { outline: none; border-color: var(--accent); }
    .cta {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 1.125rem;
      font-weight: 700;
      font-family: var(--font);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(232,89,12,0.4);
    }
    .privacy {
      font-size: 0.8125rem;
      opacity: 0.5;
      margin-top: 12px;
    }
    .highlight { background: linear-gradient(transparent 60%, #FFEC99 60%); padding: 0 4px; }
    .social-proof-line { font-size: 0.8125rem; color: rgba(255,255,255,0.5); margin-top: 12px; }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.75rem;
      background: rgba(0,0,0,0.8);
    }
    footer a { color: rgba(255,255,255,0.5); }
    @media (min-width: 768px) {
      h1 { font-size: 3.25rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <p class="label">{{LABEL}}</p>
    <h1>{{HEADLINE}}</h1>
    <p class="sub"><span class="highlight">{{KEY_BENEFIT}}</span> — {{SUBHEADLINE}}</p>
    <form class="form-group" action="#" method="POST">
      <input type="email" class="form-field" placeholder="Enter your email" required>
      <button type="submit" class="cta">{{CTA_TEXT}}</button>
    </form>
    <p class="privacy">We respect your privacy. Unsubscribe anytime.</p>
    <p class="social-proof-line">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--accent)" style="vertical-align:-2px;margin-right:4px;"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span>{{SUBSCRIBER_COUNT}} people already signed up</span>
    </p>
  </section>
  <footer>&copy; {{YEAR}} {{BRAND}} | <a href="#">Privacy Policy</a></footer>
</body>
</html>
