<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NAME}} - Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #818CF8;
      --text: #E2E8F0;
      --text-light: #94A3B8;
      --bg: #0F0F23;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container {
      max-width: 440px;
      margin: 0 auto;
      text-align: center;
      padding-top: 48px;
    }
    .name {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .bio {
      font-size: 0.9375rem;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 56px;
    }

    /* Text Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-bottom: 64px;
    }
    .link-btn {
      display: block;
      padding: 4px 0;
      font-size: 1.0625rem;
      font-weight: 600;
      font-family: var(--font);
      text-decoration: none;
      color: var(--text);
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 12px;
      transition: color 0.15s, border-color 0.15s;
    }
    .link-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Social Icons */
    .socials {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .socials a {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      transition: border-color 0.15s;
    }
    .socials a:hover { border-color: var(--accent); }
    .socials svg {
      width: 18px;
      height: 18px;
      fill: var(--text-light);
      transition: fill 0.15s;
    }
    .socials a:hover svg { fill: var(--accent); }
    footer {
      font-size: 0.75rem;
      color: #4A5568;
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="name">{{NAME}}</h1>
    <p class="bio">{{BIO}}</p>

    <div class="links">
      <a href="{{LINK_1_URL}}" class="link-btn">{{LINK_1_TEXT}}</a>
      <a href="{{LINK_2_URL}}" class="link-btn">{{LINK_2_TEXT}}</a>
      <a href="{{LINK_3_URL}}" class="link-btn">{{LINK_3_TEXT}}</a>
      <a href="{{LINK_4_URL}}" class="link-btn">{{LINK_4_TEXT}}</a>
      <a href="{{LINK_5_URL}}" class="link-btn">{{LINK_5_TEXT}}</a>
    </div>

    <div class="socials">
      <!-- Instagram -->
      <a href="{{INSTAGRAM_URL}}" aria-label="Instagram">
        <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      </a>
      <!-- Twitter/X -->
      <a href="{{TWITTER_URL}}" aria-label="Twitter">
        <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
      <!-- LinkedIn -->
      <a href="{{LINKEDIN_URL}}" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
    </div>

    <footer>&copy; {{YEAR}} {{NAME}}</footer>
  </div>
</body>
</html>
